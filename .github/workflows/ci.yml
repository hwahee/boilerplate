name: CI

# JS-level verification on every push/PR: format, lint, typecheck, dead-code,
# tests, server build. Native app builds are deliberately NOT here — they are
# heavy and credentialed; see native-build.yml (manual / tag triggered).
on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier (format check)
        run: bun run format:check

      - name: ESLint (incl. architecture boundaries)
        run: bun run lint

      - name: TypeScript (strict typecheck, all workspaces)
        run: bun run typecheck

      - name: Knip (unused files/exports/dependencies)
        run: bun run knip

      - name: Tests (shared + server + app logic, in-memory DB)
        run: bun test

      - name: Server production build
        run: bun run build:server
