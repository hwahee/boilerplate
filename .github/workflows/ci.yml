name: CI

# Runs on every push (and PRs from forks) — see the DX section of the README.
on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier (format check)
        run: bun run format:check

      - name: ESLint
        run: bun run lint

      - name: TypeScript (strict typecheck)
        run: bun run typecheck

      - name: Knip (unused files/exports/dependencies)
        run: bun run knip

      - name: Tests (unit + API integration, in-memory DB)
        run: bun test

      - name: Production build
        run: bun run build
