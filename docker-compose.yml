# Local infrastructure.
#
#   docker compose up -d db          # Postgres only (bun run db:up)
#   docker compose --profile redis up -d   # + Redis (for PUBSUB_DRIVER=redis)
#   docker compose --profile app up --build  # containerized build of the app itself
#
# Credentials come from .env (see .env.example) — never hardcode secrets here.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    profiles: [redis]
    image: redis:7-alpine
    ports:
      - '6379:6379'

  app:
    profiles: [app]
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      PORT: 3000
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_local_password}@db:5432/${POSTGRES_DB:-app}
      CORS_ORIGINS: ''
      SERVER_ROLE: all
    ports:
      - '3000:3000'

volumes:
  db-data:
